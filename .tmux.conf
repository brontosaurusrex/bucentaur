# --- prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- indexing ---
set -g base-index 1
setw -g pane-base-index 1   # panes also start at 1 (nice consistency)

# --- mouse ---
set -g mouse on

# --- reload config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# --- status bar ---
set -g status-position top
set -g status-justify left
set -g status-style fg=white,bg=default
set -g status-right "#{host} %H%M%^b%d%y"

# --- pane borders ---
set -g pane-border-style fg=green
set -g pane-active-border-style fg=green

# --- pane border status ---
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} #{?pane_active,█,_} "

# --- misc usability tweaks ---
set -g history-limit 10000
set -g set-clipboard on

# faster key response (feels snappier)
set -sg escape-time 0

# better splits (keep cwd)
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"